<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MZN Luxury Dark</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(-45deg,#000,#111,#1a1a1a,#2b1055);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
position:relative;
z-index:2;
text-align:center;
}

h1{
font-size:80px;
letter-spacing:8px;
text-shadow:
0 0 10px #8a2be2,
0 0 20px #8a2be2,
0 0 40px #8a2be2,
0 0 80px #8a2be2;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
transform:scale(1);
}
to{
transform:scale(1.05);
}
}

p{
margin-top:15px;
font-size:20px;
color:#ccc;
letter-spacing:2px;
}

button{
margin-top:30px;
padding:14px 40px;
border:none;
border-radius:40px;
background:#8a2be2;
color:white;
font-size:18px;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 20px #8a2be2;
}

button:hover{
transform:scale(1.1);
background:#a855f7;
}

.socials{
margin-top:25px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.socials a{
text-decoration:none;
padding:12px 25px;
border-radius:30px;
background:rgba(255,255,255,0.08);
color:white;
border:1px solid #8a2be2;
transition:0.4s;
box-shadow:0 0 10px #8a2be2;
}

.socials a:hover{
background:#8a2be2;
transform:scale(1.1);
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(138,43,226,0.3);
animation:float 6s infinite ease-in-out;
}

.circle:nth-child(1){
width:200px;
height:200px;
top:10%;
left:10%;
}

.circle:nth-child(2){
width:300px;
height:300px;
bottom:10%;
right:10%;
animation-delay:2s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-30px);
}
}
</style>
</head>

<body>
<body onload="playSound()">
<div class="bg"></div>
<body onload="playSound()">
<div class="circle"></div>
<div class="circle"></div>

<div class="container">
<h1>MZN</h1>
<p>LUXURY DARK AESTHETIC</p>

<button>ENTER</button>

<div class="socials">
<a href="https://instagram.com/" target="_blank">Instagram</a>
<a href="https://youtube.com/" target="_blank">YouTube</a>
<a href="https://t.me/" target="_blank">Telegram</a>
</div>

</div>

</body>
</html>

<audio id="enterSound" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>
<button onclick="playEnter()">Enter</button>
